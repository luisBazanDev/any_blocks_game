<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Any blocks Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="game">
        <canvas width="1000" height="1000" id="canvas"></canvas>
        <canvas width="1000" height="1000" id="cursor"></canvas>
      </div>
      <div class="statistics">
        <div class="game-header">
          <h1>Any Blocks Game</h1>
          <p class="author">By Luis Bazan</p>
        </div>

        <div class="stat-card">
          <h2 class="stat-title">SURVIVAL TIME</h2>
          <div class="time-display">
            <span id="time">00:00</span>
          </div>

          <div class="mode-selector">
            <label>Game Mode</label>
            <div class="mode-options">
              <button id="mode-classic" class="mode-btn active" onclick="setMode('classic')">Classic</button>
              <button id="mode-gravity" class="mode-btn" onclick="setMode('gravity')">Gravity</button>
            </div>
          </div>
          
          <button class="reset-btn" onclick="resetGame()">
            <span>Restart Game</span>
          </button>
        </div>
        
        <div class="instructions">
          <h3>How to play</h3>
          <p>Dodge the moving blocks with your mouse. Don't let them hit you!</p>
        </div>
      </div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
